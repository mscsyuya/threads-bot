name: Post to Threads

on:
  workflow_dispatch:

  schedule:
    - cron: "0 12 * * *"   # JST 21:00
    - cron: "30 14 * * *"  # JST 23:30
    - cron: "0 17 * * *"   # JST 02:00

permissions:
  contents: write  # 履歴ファイルをコミットするために必要

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Random delay (anti-detection)
        run: |
          DELAY=$((RANDOM % 600))
          echo "Sleeping for $DELAY seconds to add jitter"
          sleep $DELAY

      - name: Post to Threads
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python post_to_threads.py

      - name: Commit history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posted_history.json
          if ! git diff --staged --quiet; then
            git commit -m "Update posted history [skip ci]"
            git push
          fi
